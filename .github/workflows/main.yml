name: Build FrostCases

# Сборка запускается автоматически при любом изменении в ветке main или master
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем твой код из репозитория на виртуальную машину
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем правильную Java 17, которая нужна для 1.16.5 папера
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Запускаем компиляцию проекта через Maven
      - name: Build with Maven
        run: mvn clean package

      # 4. Сохраняем готовый .jar плагин, чтобы ты мог его скачать с сайта
      - name: Upload Finished Plugin
        uses: actions/upload-artifact@v4
        with:
          name: FrostCases-Plugin-Jar
          path: target/FrostCases-1.0.jar
