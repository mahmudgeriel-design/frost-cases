name: Build FrostCases

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Указываем Гитхабу зайти в папку FrostCases, где лежит pom.xml
      - name: Build with Maven
        run: mvn clean package -f FrostCases/pom.xml

      # Исправляем путь к готовому jar файлу
      - name: Upload Finished Plugin
        uses: actions/upload-artifact@v4
        with:
          name: FrostCases-Plugin-Jar
          path: FrostCases/target/FrostCases-1.0.jar
